<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Core Lyrics Logic Engine</title>
    <style>
        :root {
            /* Customize these variables or let your app inject them */
            --text-inactive: rgba(255, 255, 255, 0.1);
            --text-active: #ffffff;
            --font-family: -apple-system, BlinkMacSystemFont, sans-serif;
        }

        body {
            margin: 0;
            padding: 0;
            background: transparent !important; /* Fully see-through canvas */
            font-family: var(--font-family);
            color: var(--text-active);
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
            align-items: center;
            justify-content: center;
        }

        /* Lyrics Scroll Container viewport */
        .lyrics-container {
            width: 100%;
            height: 100vh;
            overflow-y: scroll;
            scroll-behavior: smooth;
            scrollbar-width: none; 
        }

        .lyrics-container::-webkit-scrollbar {
            display: none; 
        }

        /* Vertically centers the active line in the view window */
        .lyrics-padding {
            padding-top: 45vh; 
            padding-bottom: 50vh;
        }

        /* Sentence Blocks */
        .lyric-line {
            display: block !important;
            width: 100%;
            text-align: left;
            font-size: 36px;
            font-weight: 800;
            line-height: 1.4;
            margin: 40px 0;
            transition: transform 0.4s cubic-bezier(0.25, 1, 0.5, 1), opacity 0.4s ease;
            transform-origin: left center;
            opacity: 0.2;
            white-space: normal !important;
        }

        /* Text states mimicking the Apple Music hierarchy */
        .lyric-line.past { opacity: 0.4; transform: scale(0.96); }
        .lyric-line.active { opacity: 1; transform: scale(1.04); }

        /* Forces word structures to remain perfectly horizontal within sentences */
        .word-group {
            display: inline-flex !important;
            white-space: nowrap !important;
            margin-right: 12px; 
            vertical-align: bottom;
        }

        /* High-precision width clipping mask masking unplayed letters */
        .word-wrapper {
            position: relative;
            display: inline-block;
            overflow: hidden;
            width: 0%; 
            color: var(--text-inactive);
            transition: width 0s linear;
        }

        /* Custom color mask trick overlaying active/past letters */
        .word-wrapper::before {
            content: attr(data-text);
            position: absolute;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            color: var(--text-active);
            overflow: hidden;
            white-space: nowrap;
        }

        /* Completed Word Status */
        .word-wrapper.sung {
            width: 100% !important;
            transition: none !important;
        }

        /* Tune Notation Formatting */
        .music-icon {
            display: inline-block;
            font-size: 40px;
            opacity: 0.4;
            width: auto;
        }
    </style>
</head>
<body>

    </div>

            { id: 14, words: [

                { text: "pressure,", start: 58.30, dur: 0.50 }, { text: "feel", start: 58.80, dur: 0.30 },
                { text: "the", start: 59.10, dur: 0.20 }, { text: "heat", start: 59.30, dur: 0.40 },
                { text: "right", start: 59.70, dur: 0.30 }, { text: "now", start: 60.00, dur: 0.30 }
            ]},
            { id: 15, words: [
                { text: "We", start: 60.30, dur: 0.30 }, { text: "don't", start: 60.60, dur: 0.30 },
                { text: "talk,", start: 60.90, dur: 0.40 }, { text: "we", start: 61.30, dur: 0.20 },
                { text: "just", start: 61.50, dur: 0.30 }, { text: "breathe", start: 61.80, dur: 0.40 },
                { text: "it", start: 62.20, dur: 0.20 }, { text: "out", start: 62.40, dur: 0.30 }
            ]}
        ];

        const lyricsContainer = document.getElementById('lyricsContainer');
        const lyricsWrapper = document.getElementById('lyricsWrapper');

        function buildLyricInterface() {
            lyricsWrapper.innerHTML = '';
            sentenceTimelineData.forEach((lineData, lineIdx) => {
                const lineDiv = document.createElement('div');
                lineDiv.classList.add('lyric-line');
                lineDiv.setAttribute('id', `line-${lineIdx}`);

                lineData.words.forEach((wordObj, wordIdx) => {
                    const wordGroup = document.createElement('span');
                    wordGroup.classList.add('word-group');

                    const wrapSpan = document.createElement('span');
                    wrapSpan.classList.add('word-wrapper');
                    if (lineData.isTune) wrapSpan.classList.add('music-icon');
                    
                    wrapSpan.setAttribute('id', `w-${lineIdx}-${wordIdx}`);
                    wrapSpan.setAttribute('data-text', wordObj.text); // Used for clean coloring overlays
                    wrapSpan.innerText = wordObj.text;

                    wordGroup.appendChild(wrapSpan);
                    lineDiv.appendChild(wordGroup);
                });
                lyricsWrapper.appendChild(lineDiv);
            });
        }

        /* PRODUCTION EXPOSED API BRIDGE
           Your native code calls this function directly to sync the sheet layout.
           Parameters:
             - currentTime (Float): e.g., 17.42
             - isPaused (Boolean): tracks if the app's player state is halted
        */
        window.updateLyricsFromApp = function(currentTime, isPaused) {
            let activeLineIdx = -1;

            // Pinpoint current active block sentence
            for (let i = 0; i < sentenceTimelineData.length; i++) {
                const words = sentenceTimelineData[i].words;
                const start = words[0].start;
                const end = words[words.length - 1].start + words[words.length - 1].dur;
                if (currentTime >= start && currentTime < end) {
                    activeLineIdx = i;
                    break;
                }
            }

            sentenceTimelineData.forEach((lineData, lIdx) => {
                const lineElement = document.getElementById(`line-${lIdx}`);
                if (!lineElement) return;

                if (lIdx < activeLineIdx) {
                    lineElement.className = 'lyric-line past';
                    lineData.words.forEach((_, wIdx) => {
                        const wNode = document.getElementById(`w-${lIdx}-${wIdx}`);
                        if (wNode) wNode.className = 'word-wrapper sung';
                    });
                } 
                else if (lIdx === activeLineIdx) {
                    lineElement.className = 'lyric-line active';

                    lineData.words.forEach((word, wIdx) => {
                        const wNode = document.getElementById(`w-${lIdx}-${wIdx}`);
                        if (!wNode) return;

                        const timeElapsedInWord = currentTime - word.start;

                        if (currentTime >= word.start && currentTime < (word.start + word.dur)) {
                            wNode.classList.remove('sung');
                            const completionPercent = (timeElapsedInWord / word.dur) * 100;

                            if (isPaused) {
                                wNode.style.transition = 'none';
                                wNode.style.width = `${completionPercent}%`;
                            } else {
                                const remainingDur = word.dur - timeElapsedInWord;
                                wNode.style.transition = `width ${remainingDur}s linear`;
                                wNode.style.width = '100%';
                            }
                        } 
                        else if (currentTime >= (word.start + word.dur)) {
                            wNode.className = 'word-wrapper sung';
                        } 
                        else {
                            wNode.className = 'word-wrapper';
                            wNode.style.transition = 'none';
                            wNode.style.width = '0%';
                        }
                    });

                    // Centering math calculations matching fluid viewport tracks
                    const targetScroll = lineElement.offsetTop - (lyricsContainer.clientHeight / 2) + (lineElement.clientHeight / 2);
                    lyricsContainer.scrollTop = targetScroll;
                } 
                else {
                    lineElement.className = 'lyric-line';
                    lineData.words.forEach((_, wIdx) => {
                        const wNode = document.getElementById(`w-${lIdx}-${wIdx}`);
                        if (wNode) {
                            wNode.className = 'word-wrapper';
                            wNode.style.transition = 'none';
                            wNode.style.width = '0%';
                        }
                    });
                }
            });
        }

        window.addEventListener('DOMContentLoaded', buildLyricInterface);
    </script>

</html>
